name: Manual ML Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    timeout-minutes: 30

    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Python Info
        run: |
          python --version
          pip --version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Installed Packages
        run: |
          pip list

      - name: Show Project Structure
        run: |
          pwd
          ls -R

      - name: Import Check
        run: |
          python - <<EOF
          import src
          print("Project imported successfully ✅")
          EOF

      - name: Run Training Pipeline
        continue-on-error: true
        run: |
          python -m src.pipeline.training_pipeline

      - name: Check Artifacts
        run: |
          echo "========== ARTIFACTS =========="
          if [ -d artifacts ]; then
            ls -lh artifacts
          else
            echo "Artifacts directory not found."
          fi

      - name: Start FastAPI
        run: |
          python -m uvicorn app.api:app \
            --host 127.0.0.1 \
            --port 8000 \
            > api.log 2>&1 &

          sleep 10

          echo "========== API LOG =========="
          cat api.log || true

      - name: Health Check
        run: |
          curl --fail http://127.0.0.1:8000/

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts
          path: |
            artifacts/**
          if-no-files-found: ignore

      - name: Upload API Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: api.log
          if-no-files-found: ignore

      - name: Workflow Summary
        if: always()
        run: |
          echo "## 🚀 Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Repository checked out" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Python environment ready" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependencies installed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Import check completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Training pipeline executed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ FastAPI started (see api.log if failed)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Health check executed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Artifacts uploaded" >> $GITHUB_STEP_SUMMARY